version: '3.8'

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "3"

services:
  # ==========================================
  # 1. 数据库与缓存层 (持久化核心)
  # ==========================================
  postgres:
    image: postgres:15-alpine
    container_name: kforge-db
    environment:
      POSTGRES_USER: ${DB_USER:-kforge_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kforge_secure_pass_2026}
      POSTGRES_DB: ${DB_NAME:-kforge_prod}
    volumes:
      - kforge_pg_data:/var/lib/postgresql/data
    # 不映射端口到宿主机，仅在 Docker 内网暴露，极致安全
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-kforge_admin} -d ${DB_NAME:-kforge_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    restart: unless-stopped

  # ==========================================
  # 2. 核心控制平面 (Daemon API)
  # ==========================================
  daemon:
    build:
      context: .
      dockerfile: ./docker/daemon.Dockerfile
    container_name: kforge-daemon
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=postgresql://${DB_USER:-kforge_admin}:${DB_PASSWORD:-kforge_secure_pass_2026}@postgres:5432/${DB_NAME:-kforge_prod}?schema=public
      # 🚀 去中心化 Web3 节点配置 (完全不依赖 TronGrid)
      # 这里配置了 3 个免费的公共波场节点，Daemon 可以在代码中实现轮询/故障转移
      - TRON_PUBLIC_NODES=https://api.trongrid.io,https://rpc.ankr.com/tron_jsonrpc,https://tron-rpc.publicnode.com
    volumes:
      # 挂载宿主机的 docker.sock 以便 Daemon 能拉起防御容器 (DDoS盾/WAF等)
      - /var/run/docker.sock:/var/run/docker.sock
      - ./simulations:/app/simulations
    expose:
      - "4000"
    depends_on:
      postgres:
        condition: service_healthy
    logging: *default-logging
    restart: unless-stopped

  # ==========================================
  # 3. 统一流量网关与前端托管 (Nginx)
  # ==========================================
  gateway:
    image: nginx:alpine
    container_name: kforge-gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # 挂载前端构建产物
      - ./apps/h5-builder/out:/usr/share/nginx/html/h5:ro
      - ./apps/admin/dist:/usr/share/nginx/html/admin:ro
      - ./apps/academy/out:/usr/share/nginx/html/academy:ro
      # SSL 证书目录 (生产环境必需)
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - daemon
    logging: *default-logging
    restart: unless-stopped

volumes:
  kforge_pg_data:
