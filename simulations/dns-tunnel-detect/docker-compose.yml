version: '3.8'

services:
  dns-server:
    image: ubuntu:latest
    container_name: dns-server
    command: >
      bash -c "
      apt update && apt install -y bind9 dnsutils &&
      echo 'zone \"example.com\" { type master; file \"/etc/bind/db.example.com\"; };' >> /etc/bind/named.conf.local &&
      echo '\$TTL 604800\n@ IN SOA ns1.example.com. admin.example.com. ( 1 604800 86400 2419200 604800 )\n@ IN NS ns1.example.com.\nns1 IN A 10.0.1.3\ntest IN A 10.0.1.2' > /etc/bind/db.example.com &&
      service named start &&
      tail -f /dev/null
      "
    networks:
      simulation-net:
        ipv4_address: 10.0.1.3

  attacker:
    image: ubuntu:latest
    container_name: attacker
    command: >
      bash -c "
      apt update && apt install -y iodine dnsutils curl &&
      tail -f /dev/null
      "
    networks:
      simulation-net:
        ipv4_address: 10.0.1.2

  detector:
    image: ubuntu:latest
    container_name: detector
    command: >
      bash -c "
      apt update && apt install -y tshark tcpdump &&
      tail -f /dev/null
      "
    networks:
      simulation-net:
        ipv4_address: 10.0.1.4

networks:
  simulation-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.1.0/24
