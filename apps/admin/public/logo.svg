<svg xmlns="http://www.w3.org/2000/svg" width="260" height="64" viewBox="0 0 260 64" fill="none">
  <defs>
    <linearGradient id="cyber-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#007BFF"/>
    </linearGradient>
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <g transform="translate(12, 8)">
    <!-- 外层防御盾牌 -->
    <path d="M24 0 L46 12 L46 36 L24 48 L2 36 L2 12 Z" fill="#0B1021" stroke="url(#cyber-glow)" stroke-width="2.5" filter="url(#neon)"/>
    <!-- 内层赛博纹路 -->
    <path d="M24 6 L38 14 L38 34 L24 42 L10 34 L10 14 Z" fill="none" stroke="#00E5FF" stroke-width="1.5" opacity="0.6"/>
    <!-- 核心 K 字矩阵 -->
    <path d="M18 14 L22 14 L22 34 L18 34 Z" fill="#00E5FF"/>
    <path d="M22 24 L32 14 L36 14 L26 24 Z" fill="#00E5FF"/>
    <path d="M22 24 L32 34 L36 34 L26 24 Z" fill="#00E5FF"/>
    <!-- 数据节点 -->
    <circle cx="20" cy="14" r="2" fill="#FFFFFF"/>
    <circle cx="20" cy="34" r="2" fill="#FFFFFF"/>
    <circle cx="34" cy="14" r="2" fill="#FFFFFF"/>
    <circle cx="34" cy="34" r="2" fill="#FFFFFF"/>
    <circle cx="24" cy="24" r="2" fill="#FFFFFF"/>
  </g>

  <g transform="translate(76, 20)">
    <text x="0" y="22" fill="#FFFFFF" font-size="24" font-family="'Inter', system-ui, -apple-system, sans-serif" font-weight="900" letter-spacing="1.5">KFORGE</text>
    <text x="110" y="22" fill="#00E5FF" font-size="24" font-family="'Inter', system-ui, -apple-system, sans-serif" font-weight="300" letter-spacing="1.5">SEC</text>
  </g>
</svg>