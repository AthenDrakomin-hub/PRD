name: Deploy KForge Academy to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - 'apps/academy/**'
      - 'docs/knowledge-base/**'
  workflow_dispatch:

# 设置权限以允许 GitHub Pages 部署
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Academy Next.js App
        run: npm run build --workspace=@kforge/academy

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./apps/academy/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
